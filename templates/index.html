<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pricing Module</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 14px;
            color: #666;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            border: 1px solid #e5e5e5;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field.full { grid-column: 1 / -1; }

        label {
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
        }

        input[type="text"] {
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        input[type="text"]:focus { border-color: #1a1a1a; }

        .section-label {
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            margin-bottom: 10px;
        }

        .platforms {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .platform-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }

        .platform-chip input { display: none; }

        .platform-chip.active {
            background: #1a1a1a;
            color: white;
            border-color: #1a1a1a;
        }

        .divider {
            border: none;
            border-top: 1px solid #f0f0f0;
            margin: 20px 0;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
        }

        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .result-card { display: none; }
        .result-card.visible { display: block; }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .result-title { font-size: 18px; font-weight: 600; }

        .confidence {
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .confidence.High { background: #e6f4ea; color: #2d6a3f; }
        .confidence.Medium { background: #fff8e1; color: #b45309; }
        .confidence.Low { background: #fdecea; color: #991b1b; }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .price-block {
            background: #f8f8f8;
            border-radius: 8px;
            padding: 14px;
        }

        .price-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            margin-bottom: 6px;
        }

        .price-value {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
        }

        .reasoning {
            background: #f8f8f8;
            border-radius: 8px;
            padding: 14px;
            font-size: 13px;
            line-height: 1.7;
            color: #555;
        }

        .reasoning-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #888;
            margin-bottom: 6px;
        }

        .error { color: #991b1b; font-size: 14px; text-align: center; padding: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Film Licensing Price Estimator</h1>
            <p>Estimate licensing deal benchmarks powered by AI</p>
        </div>

        <div class="card">
            <div class="grid">
                <div class="field">
                    <label>Title name</label>
                    <input type="text" id="title" placeholder="e.g. Oppenheimer" />
                </div>
                <div class="field">
                    <label>IMDB link</label>
                    <input type="text" id="imdb_link" placeholder="https://imdb.com/title/tt…" />
                </div>
                <div class="field">
                    <label>Region</label>
                    <input type="text" id="region" placeholder="e.g. India, LATAM, Europe" />
                </div>
                <div class="field">
                    <label>Duration</label>
                    <input type="text" id="duration" placeholder="e.g. 148 min or 8 episodes" />
                </div>
                <div class="field">
                    <label>Rights type</label>
                    <input type="text" id="rights_type" placeholder="Exclusive / Non-Exclusive" />
                </div>
                <div class="field">
                    <label>Language rights</label>
                    <input type="text" id="language_rights" placeholder="Original / Original + Dubbed" />
                </div>
            </div>

            <hr class="divider" />

            <p class="section-label">Distribution platforms</p>
            <div class="platforms">
                <label class="platform-chip" onclick="toggleChip(this, event)">
                    <input type="checkbox" value="YouTube" /> YouTube
                </label>
                <label class="platform-chip" onclick="toggleChip(this, event)">
                    <input type="checkbox" value="OTT / Streaming" /> OTT / Streaming
                </label>
                <label class="platform-chip" onclick="toggleChip(this, event)">
                    <input type="checkbox" value="Pay TV" /> Pay TV
                </label>
                <label class="platform-chip" onclick="toggleChip(this, event)">
                    <input type="checkbox" value="Free-to-Air TV" /> Free-to-Air TV
                </label>
                <label class="platform-chip" onclick="toggleChip(this, event)">
                    <input type="checkbox" value="FAST channels" /> FAST channels
                </label>
            </div>

            <button class="btn" onclick="submitForm()">Get Estimate →</button>
        </div>

        <div class="card result-card" id="result">
        </div>
    </div>

    <script>
        function toggleChip(el, event) {
            event.preventDefault()
            el.classList.toggle('active')
            el.querySelector('input').checked = el.classList.contains('active')
        }

        async function submitForm() {
            const data = {
                title: document.getElementById("title").value,
                imdb_link: document.getElementById("imdb_link").value,
                region: document.getElementById("region").value,
                duration: document.getElementById("duration").value,
                rights_type: document.getElementById("rights_type").value,
                language_rights: document.getElementById("language_rights").value,
                platforms: []
            }

            document.querySelectorAll(".platform-chip.active input").forEach(cb => {
                data.platforms.push(cb.value)
            })

            const requiredFields = ["title", "imdb_link", "region", "duration", "rights_type", "language_rights"]
            for (let field of requiredFields) {
                if (!data[field].trim()) {
                    alert(`Please fill in the ${field.replace("_", " ")} field.`)
                    return
                }
            }

            if (data.platforms.length === 0) {
                alert("Please select at least one platform.")
                return
            }

            const btn = document.querySelector(".btn")
            const resultDiv = document.getElementById("result")
            btn.disabled = true
            btn.textContent = "Estimating..."
            resultDiv.className = "card result-card"
            resultDiv.innerHTML = ""

            try {
                const response = await fetch("/estimate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                })

                if (!response.ok) throw new Error("Server error. Please try again.")

                const result = await response.json()
                resultDiv.innerHTML = `
                    <div class="result-header">
                        <span class="result-title">${result.title} — ${result.region}</span>
                        <span class="confidence ${result.confidence_level}">${result.confidence_level} confidence</span>
                    </div>
                    <div class="pricing-grid">
                        <div class="price-block">
                            <div class="price-label">Flat fee range</div>
                            <div class="price-value">${result.pricing_estimate.flat_fee_range}</div>
                        </div>
                        <div class="price-block">
                            <div class="price-label">Minimum guarantee</div>
                            <div class="price-value">${result.pricing_estimate.minimum_guarantee}</div>
                        </div>
                        <div class="price-block">
                            <div class="price-label">Revenue share</div>
                            <div class="price-value">${result.pricing_estimate.revenue_share_range}</div>
                        </div>
                    </div>
                    <div class="reasoning">
                        <div class="reasoning-label">Reasoning</div>
                        ${result.reasoning}
                    </div>
                `
                resultDiv.classList.add("visible")

            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`
                resultDiv.classList.add("visible")
            } finally {
                btn.disabled = false
                btn.textContent = "Get Estimate →"
            }
        }
    </script>
</body>
</html>
